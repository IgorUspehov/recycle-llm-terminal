<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recycle LLM Terminal - Multi-Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        :root { --main-green: #064e3b; --accent-yellow: #facc15; }
        body { background-color: #f8fafc; color: #1e293b; font-family: sans-serif; }
        .nav-bg { background-color: var(--main-green); }
        .yellow-text { color: var(--accent-yellow); }
        .btn-yellow { background-color: var(--accent-yellow); color: var(--main-green); }
        .section-card { border-left: 4px solid var(--accent-yellow); background: white; }
    </style>
</head>
<body x-data="{ 
    lang: 'ru', 
    section: 'home',
    data: {
        ru: {
            nav: ['Главная', 'Документация', 'Статьи', 'API', 'Контакты'],
            hero: 'Управление LLM Терминалом',
            s1_title: 'Добро пожаловать',
            s1_text: 'Полнофункциональный интерфейс для переработки данных и управления нейросетями.',
            s2_title: 'Документация CLI',
            s2_text: 'Инструкции по работе с командной строкой и интеграции модулей.',
            s3_title: 'Статьи и SEO',
            s3_text: 'Здесь будут ваши статьи с низкочастотными ключами для продвижения.',
            s4_title: 'API Доступ',
            s4_text: 'Настройки и ключи для подключения внешних сервисов.',
            s5_title: 'Контакты',
            s5_text: 'Связь с разработчиком и поддержка проекта.'
        },
        en: {
            nav: ['Home', 'Docs', 'Articles', 'API', 'Contacts'],
            hero: 'LLM Terminal Control',
            s1_title: 'Welcome',
            s1_text: 'Full-featured interface for data recycling and AI management.',
            s2_title: 'CLI Documentation',
            s2_text: 'Instructions for command line operations and module integration.',
            s3_title: 'Articles & SEO',
            s3_text: 'This section is for your long-tail keyword articles.',
            s4_title: 'API Access',
            s4_text: 'Settings and keys for connecting external services.',
            s5_title: 'Contacts',
            s5_text: 'Developer contact and project support.'
        },
        de: {
            nav: ['Startseite', 'Docs', 'Artikel', 'API', 'Kontakte'],
            hero: 'LLM Terminal Steuerung',
            s1_title: 'Willkommen',
            s1_text: 'Voll funktionsfähige Schnittstelle für Datenrecycling und KI-Management.',
            s2_title: 'CLI Dokumentation',
            s2_text: 'Anweisungen für Befehlszeilenoperationen und Modulintegration.',
            s3_title: 'Artikel & SEO',
            s3_text: 'Dieser Bereich ist für Ihre Long-Tail-Keyword-Artikel gedacht.',
            s4_title: 'API-Zugriff',
            s4_text: 'Einstellungen und Schlüssel für die Anbindung externer Dienste.',
            s5_title: 'Kontakte',
            s5_text: 'Entwicklerkontakt und Projektunterstützung.'
        }
    }
}">

    <nav class="nav-bg p-4 sticky top-0 z-50 shadow-xl">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="font-black text-xl yellow-text uppercase italic">RecycleLLM</div>
            
            <div class="hidden md:flex gap-6 text-white text-sm font-bold">
                <button @click="section = 'home'" class="hover:text-yellow-400 transition" x-text="data[lang].nav[0]"></button>
                <button @click="section = 'docs'" class="hover:text-yellow-400 transition" x-text="data[lang].nav[1]"></button>
                <button @click="section = 'articles'" class="hover:text-yellow-400 transition" x-text="data[lang].nav[2]"></button>
                <button @click="section = 'api'" class="hover:text-yellow-400 transition" x-text="data[lang].nav[3]"></button>
                <button @click="section = 'contact'" class="hover:text-yellow-400 transition" x-text="data[lang].nav[4]"></button>
            </div>

            <div class="flex gap-2 bg-green-900 p-1 rounded border border-green-700">
                <template x-for="l in ['ru', 'en', 'de']">
                    <button @click="lang = l" :class="lang === l ? 'btn-yellow' : 'text-white'" class="px-2 py-1 rounded text-[10px] font-bold uppercase transition" x-text="l"></button>
                </template>
            </div>
        </div>
    </nav>

    <header class="nav-bg py-16 text-center border-t border-green-800">
        <h1 class="text-4xl md:text-5xl font-black text-white mb-4 uppercase tracking-tight" x-text="data[lang].hero"></h1>
        <div class="h-1 w-32 bg-yellow-400 mx-auto"></div>
    </header>

    <main class="max-w-5xl mx-auto py-12 px-6">
        
        <section x-show="section === 'home'" class="section-card p-8 rounded-lg shadow-sm">
            <h2 class="text-2xl font-bold mb-4 flex items-center gap-3">
                <span class="w-2 h-8 bg-green-800"></span>
                <span x-text="data[lang].s1_title"></span>
            </h2>
            <p class="text-lg text-slate-600" x-text="data[lang].s1_text"></p>
        </section>

        <section x-show="section === 'docs'" x-cloak class="section-card p-8 rounded-lg shadow-sm">
            <h2 class="text-2xl font-bold mb-4" x-text="data[lang].s2_title"></h2>
            <p class="mb-6 text-slate-600" x-text="data[lang].s2_text"></p>
            <div class="bg-slate-900 p-4 rounded font-mono text-green-400 text-sm">
                <p>$ recycle-cli --init</p>
                <p>$ loading configuration...</p>
                <p>$ status: ready</p>
            </div>
        </section>

        <section x-show="section === 'articles'" x-cloak class="section-card p-8 rounded-lg shadow-sm">
            <h2 class="text-2xl font-bold mb-4 text-green-900" x-text="data[lang].s3_title"></h2>
            <p class="mb-8 text-slate-600" x-text="data[lang].s3_text"></p>
            <div class="grid gap-4">
                <div class="p-4 border border-slate-100 rounded hover:bg-slate-50 cursor-pointer transition">
                    <h3 class="font-bold">Низкочастотный запрос #1...</h3>
                    <p class="text-sm text-slate-500">Краткое описание статьи для SEO...</p>
                </div>
            </div>
        </section>

        <section x-show="section === 'api'" x-cloak class="section-card p-8 rounded-lg shadow-sm">
            <h2 class="text-2xl font-bold mb-4" x-text="data[lang].s4_title"></h2>
            <p class="text-slate-600" x-text="data[lang].s4_text"></p>
        </section>

        <section x-show="section === 'contact'" x-cloak class="section-card p-8 rounded-lg shadow-sm">
            <h2 class="text-2xl font-bold mb-4" x-text="data[lang].s5_title"></h2>
            <p class="text-slate-600" x-text="data[lang].s5_text"></p>
        </section>

    </main>

    <footer class="text-center py-8 text-slate-400 text-xs uppercase tracking-widest">
        <p>© 2026 Recycle LLM Terminal • IgorUspehov</p>
    </footer>

</body>
</html>
