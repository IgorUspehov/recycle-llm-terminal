<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recycle LLM Terminal | Open Source Project</title>
    <meta name="description" content="Recycle LLM Terminal - инновационный интерфейс для работы с языковыми моделями.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root { --bg-forest: #052e16; --accent-yellow: #fde047; --text-light: #f0fdf4; --card-green: #064e3b; }
        body { background-color: var(--bg-forest); color: var(--text-light); font-family: sans-serif; margin: 0; }
        .yellow-bg { background-color: var(--accent-yellow); color: var(--bg-forest); }
        .terminal-window { background: #022c22; border: 1px solid #166534; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .article-card { background: var(--card-green); border-left: 4px solid var(--accent-yellow); transition: 0.3s; }
        .article-card:hover { background: #065f46; }
    </style>
</head>
<body x-data="{ 
    lang: 'ru',
    translations: {
        ru: { hero: 'Recycle LLM Terminal', sub: 'Интерфейс управления будущим. Эффективно и быстро.', navArt: 'Статьи', navRepo: 'Репозиторий', artH2: 'Блог и SEO материалы', art1T: 'Низкочастотные ключи 2026', art1D: 'Как продвигать ИТ-проекты через узкие поисковые запросы...', read: 'Читать далее' },
        en: { hero: 'Recycle LLM Terminal', sub: 'Future interface. Efficient and fast.', navArt: 'Articles', navRepo: 'Repo', artH2: 'Blog & SEO Materials', art1T: 'Long-tail keywords 2026', art1D: 'How to promote IT projects using niche search queries...', read: 'Read more' },
        de: { hero: 'Recycle LLM Terminal', sub: 'Zukunftsschnittstelle. Effizient und schnell.', navArt: 'Artikel', navRepo: 'Repo', artH2: 'Blog & SEO Materialien', art1T: 'Long-Tail-Keywords 2026', art1D: 'Wie man IT-Projekte über Nischen-Suchanfragen bewirbt...', read: 'Weiterlesen' }
    }
}">
    <nav class="p-6 border-b border-green-800 flex justify-between items-center max-w-6xl mx-auto">
        <div class="text-2xl font-black italic" style="color: var(--accent-yellow)">Recycle<span class="text-white">LLM</span></div>
        <div class="flex items-center gap-6">
            <a href="#articles" class="font-bold hover:text-yellow-400 transition" x-text="translations[lang].navArt"></a>
            <div class="flex bg-black bg-opacity-30 p-1 rounded-lg border border-green-700">
                <template x-for="l in ['ru', 'en', 'de']">
                    <button @click="lang = l" :class="lang === l ? 'yellow-bg' : 'text-white'" class="px-2 py-1 rounded text-xs font-bold uppercase transition" x-text="l"></button>
                </template>
            </div>
        </div>
    </nav>

    <header class="max-w-6xl mx-auto py-20 px-6 text-center">
        <h1 class="text-6xl font-black mb-6" x-text="translations[lang].hero"></h1>
        <p class="text-xl text-green-200 mb-8" x-text="translations[lang].sub"></p>
        <div class="terminal-window rounded-lg p-6 font-mono text-left max-w-2xl mx-auto border-t-4 border-yellow-400">
            <div class="flex gap-2 mb-4">
                <div class="w-3 h-3 rounded-full bg-red-500"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                <div class="w-3 h-3 rounded-full bg-green-500"></div>
            </div>
            <p class="text-yellow-400">$ system_init --mode secure</p>
            <p class="text-green-300">Loading modules... [OK]</p>
            <p class="text-white">Kernel: LLM-Terminal-v4</p>
            <p class="text-green-400 animate-pulse">_</p>
        </div>
    </header>

    <section id="articles" class="max-w-6xl mx-auto py-16 px-6">
        <h2 class="text-3xl font-bold mb-10 italic uppercase" x-text="translations[lang].artH2"></h2>
        <div class="grid md:grid-cols-2 gap-8">
            <div class="article-card p-8 rounded shadow-xl">
                <div class="text-yellow-400 text-xs font-bold mb-2 uppercase tracking-widest">SEO strategy</div>
                <h3 class="text-2xl font-bold mb-4" x-text="translations[lang].art1T"></h3>
                <p class="opacity-80 mb-6 text-green-100" x-text="translations[lang].art1D"></p>
                <button class="font-bold border-b-2 border-yellow-400 pb-1 hover:text-yellow-400" x-text="translations[lang].read"></button>
            </div>
        </div>
    </section>

    <footer class="py-12 border-t border-green-800 text-center opacity-50 text-sm">
        <p>© 2026 Recycle LLM Project. GitHub Pages Ready.</p>
    </footer>
</body>
</html>
